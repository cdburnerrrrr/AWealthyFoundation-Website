<svg viewBox="0 0 220 84" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">A Wealthy Foundation mobile header logo</title>
  <desc id="desc">A compact mobile logo with the house icon and a shortened stacked wordmark for A Wealthy Foundation.</desc>
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(8,10)">
    <path d="M8 28L34 10L60 28" fill="none" stroke="#C47A2C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="16" y="28" width="36" height="30" rx="2.5" fill="none" stroke="#0F2A44" stroke-width="3.2"/>
    <rect x="29" y="40" width="10" height="18" rx="1.6" fill="#0F2A44"/>
    <rect x="13" y="63" width="42" height="3.6" rx="1.8" fill="#C47A2C"/>
  </g>

  <g transform="translate(84,16)">
    <text x="0" y="20"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="15.8"
      font-weight="700"
      fill="#0F2A44">A Wealthy</text>
    <text x="0" y="40"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="15.8"
      font-weight="700"
      fill="#0F2A44">Foundation</text>

    <rect x="0" y="50" width="110" height="1.1" rx="0.55" fill="#C47A2C" opacity="0.22"/>

    <text x="0" y="66"
      font-family="Arial, Helvetica, sans-serif"
      font-size="7.2"
      font-weight="600"
      letter-spacing="0.95"
